<!DOCTYPE html>
<html>
<head>
    <title>Add Oil Product</title>
</head>
<body>

<h1>Add Oil Product</h1>

<input type="text" id="companyName" placeholder="Enter Company Name"><br><br>

<input type="text" id="oilType" placeholder="Enter Oil Type"><br><br>

<select id="quantity">
    <option value="">Select Quantity</option>
    <option value="1L">1L</option>
    <option value="15L">15L</option>
</select><br><br>

<input type="number" id="price" placeholder="Enter Price"><br><br>

<button onclick="addProduct()">Add Product</button>

<p id="msg"></p>

<script>
async function addProduct() {

    const companyName = document.getElementById("companyName").value;
    const oilType = document.getElementById("oilType").value;
    const quantity = document.getElementById("quantity").value;
    const price = document.getElementById("price").value;

    const response = await fetch("http://localhost:3000/addproduct", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            companyName: companyName,
            oilType: oilType,
            quantity: quantity,
            price: price
        })
    });

    const data = await response.json();

    document.getElementById("msg").innerText = data.msg;
}
</script>

</body>
</html>
